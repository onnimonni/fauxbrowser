# Example stack: fauxbrowser + gluetun (WireGuard VPN egress).
#
# SECRETS: put your WireGuard private key etc. in a local .env file next to
# this compose file. .env is gitignored. DO NOT commit WireGuard keys.
#
# Required env vars (see .env.example):
#   WIREGUARD_PRIVATE_KEY, WIREGUARD_PUBLIC_KEY, WIREGUARD_ADDRESSES,
#   VPN_ENDPOINT_IP, VPN_ENDPOINT_PORT
#
# Optional:
#   FAUXBROWSER_AUTH           "user:pass" to require proxy auth
#   FAUXBROWSER_ALLOW_HOSTS    "host1,*.foo.com" allow-list
#   FAUXBROWSER_PROFILE        default browser profile (chrome146 ...)

services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_PUBLIC_KEY: ${WIREGUARD_PUBLIC_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      VPN_ENDPOINT_IP: ${VPN_ENDPOINT_IP}
      VPN_ENDPOINT_PORT: ${VPN_ENDPOINT_PORT}
      HTTPPROXY: "on"
    ports:
      - "127.0.0.1:18443:18443"   # published by fauxbrowser via net=service:gluetun
    restart: unless-stopped

  fauxbrowser:
    build:
      context: .
      args:
        VERSION: ${FAUXBROWSER_VERSION:-dev}
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      FAUXBROWSER_UPSTREAM: http://127.0.0.1:8888
      FAUXBROWSER_PROFILE: ${FAUXBROWSER_PROFILE:-chrome146}
      FAUXBROWSER_AUTH: ${FAUXBROWSER_AUTH:-}
      FAUXBROWSER_ALLOW_HOSTS: ${FAUXBROWSER_ALLOW_HOSTS:-}
      FAUXBROWSER_ALLOW_OPEN: "1"   # fauxbrowser binds 0.0.0.0 in the shared netns
      FAUXBROWSER_LOG_LEVEL: info
    restart: unless-stopped
